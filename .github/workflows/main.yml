 
          $settings = New-ScheduledTaskSettingsSet `
            -AllowStartIfOnBatteries `
            -DontStopIfGoingOnBatteries `
            -ExecutionTimeLimit    (New-TimeSpan -Hours 6) `
            -RestartCount          3 `
            -RestartInterval       (New-TimeSpan -Minutes 1) `
            -StartWhenAvailable

          $principal = New-ScheduledTaskPrincipal `
            -UserId    $user `
            -LogonType Interactive `
            -RunLevel  Highest

          Register-ScheduledTask `
            -TaskName   "YariAutoStart" `
            -Action     $action `
            -Trigger    $trigger `
            -Settings   $settings `
            -Principal  $principal `
            -Force | Out-Null

          $task = Get-ScheduledTask -TaskName "YariAutoStart" -ErrorAction SilentlyContinue
          if ($task) {
            Write-Host "[âœ“] Task registered successfully!"
            Write-Host "    TaskName : $($task.TaskName)"
            Write-Host "    State    : $($task.State)"
            Write-Host "    Trigger  : AtLogon ($user)"
            Write-Host "    Action   : cmd.exe /c `"$scriptPath`""
          } else {
            Write-Host "[âœ—] Task registration FAILED!"
          }

          Write-Host "===== RDP à¦¦à¦¿à¦¯à¦¼à§‡ login à¦•à¦°à¦²à§‡à¦‡ Start.bat auto-run à¦¹à¦¬à§‡! ====="

      - name: Install Python modules
        shell: pwsh
        run: |
          python -m pip install --upgrade pip
          pip install customtkinter uiautomator2 opencv-python playwright
          playwright install

      - name: Update Dashboard API
        shell: pwsh
        run: |
          $ip      = $env:TS_IP
          $serial  = "${{ inputs.backup_number }}"
          $user    = "$env:GITHUB_ACTOR"
          $info    = "$($ip)|$($serial)|$($user)"
          $encoded = [uri]::EscapeDataString($info)
          Write-Host "Updating Dashboard..."
          Invoke-WebRequest -Uri "$($env:UPDATE_API)?info=$encoded" -Method Get -UseBasicParsing

      - name: Keep alive
        shell: pwsh
        run: |
          Write-Host "=========================================="
          Write-Host "  VM alive for 6 hours â€” RDP is Ready!"
          Write-Host "  IP   : $env:TS_IP"
          Write-Host "  User : $env:RDP_USER"
          Write-Host "  Pass : $env:RDP_PASS"
          Write-Host "  NOTE : Login à¦•à¦°à¦²à§‡à¦‡ Start.bat auto-run!"
          Write-Host "=========================================="
          Start-Sleep -Seconds 21600

      - name: Done
        shell: pwsh
        run: Write-Host "Workflow Finished."
